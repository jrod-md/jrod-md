name: Metrics

on:
  # Actualizaciones diarias
  schedule:
    - cron: "0 6 * * *"
  # Ejecución manual desde Actions
  workflow_dispatch:
  # También se actualiza cuando cambia el perfil
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Skip when METRICS_TOKEN is missing
        if: ${{ secrets.METRICS_TOKEN == '' }}
        run: echo "METRICS_TOKEN is not configured. Skipping github-metrics generation."

      - uses: lowlighter/metrics@latest
        if: ${{ secrets.METRICS_TOKEN != '' }}
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: jrod-md
          template: classic
          filename: github-metrics.svg
          output_condition: data-changed
          committer_message: "chore(metrics): update profile [Skip GitHub Action]"
          base: header, activity, community, repositories, metadata

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%

          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_facts: yes

          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_limit: 5

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_stars: yes
          plugin_stars_limit: 4

          config_timezone: America/Panama
