<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">GitHub metrics terminal placeholder</title>
  <desc id="desc">Terminal-styled placeholder shown until the metrics workflow runs for the first time.</desc>
  <rect width="1200" height="280" rx="10" fill="#0d1117" stroke="#30363d"/>
  <circle cx="28" cy="25" r="6" fill="#ff7b72"/>
  <circle cx="50" cy="25" r="6" fill="#d29922"/>
  <circle cx="72" cy="25" r="6" fill="#7ee787"/>
  <text x="100" y="30" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">github-metrics.svg</text>
  <text x="34" y="78" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">jrod-md@panama:~$ metrics --status</text>
  <text x="34" y="116" fill="#79c0ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">source  :</text>
  <text x="160" y="116" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">GitHub Actions / lowlighter-metrics</text>
  <text x="34" y="148" fill="#79c0ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">status  :</text>
  <text x="160" y="148" fill="#d29922" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">awaiting first authenticated run</text>
  <text x="34" y="180" fill="#79c0ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">command :</text>
  <text x="160" y="180" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">Actions -&gt; Metrics -&gt; Run workflow</text>
  <path d="M34 222 H1166" stroke="#21262d"/>
  <text x="34" y="250" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">terminal template will replace this local fallback after the workflow succeeds</text>
</svg>


